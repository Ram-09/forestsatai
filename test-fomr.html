<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Form - ForestSAT</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:#0d1117;
      color:#fff;
      padding:50px 20px;
    }

    .container{
      max-width:900px;
      margin:auto;
      background:#161b22;
      padding:40px;
      border-radius:12px;
      border:1px solid #30363d;
    }

    h1{
      font-size:36px;
      margin-bottom:10px;
    }

    p{
      color:#8b949e;
      margin-bottom:30px;
      line-height:1.6;
    }

    .contact-form{
      width:100%;
    }

    .form-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .form-group{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      font-weight:600;
    }

    input,
    select,
    textarea{
      width:100%;
      padding:14px;
      border:1px solid #30363d;
      background:#0d1117;
      color:#fff;
      border-radius:8px;
      font-size:15px;
      outline:none;
      transition:0.3s;
    }

    input:focus,
    select:focus,
    textarea:focus{
      border-color:#238636;
    }

    textarea{
      resize:vertical;
    }

    .btn-primary{
      width:100%;
      padding:16px;
      background:#238636;
      border:none;
      color:#fff;
      font-size:16px;
      font-weight:bold;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn-primary:hover{
      background:#2ea043;
    }

    .btn-primary:disabled{
      opacity:0.7;
      cursor:not-allowed;
    }

    .message-box{
      margin-top:20px;
      padding:15px;
      border-radius:8px;
      display:none;
      font-weight:600;
    }

    .success{
      background:#0f5132;
      color:#d1e7dd;
      border:1px solid #198754;
    }

    .error-box{
      background:#842029;
      color:#f8d7da;
      border:1px solid #dc3545;
    }

    @media(max-width:768px){

      .form-row{
        grid-template-columns:1fr;
      }

      .container{
        padding:25px;
      }

      h1{
        font-size:28px;
      }
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>Contact ForestSAT</h1>

    <p>
      Tell us about your wildfire management challenge and our team will get back to you.
    </p>

    <form class="contact-form" id="contactForm" novalidate>

      <div class="form-row">

        <div class="form-group">
          <label for="fname">First Name</label>
          <input type="text" id="fname" name="fname" placeholder="Jane" required>
        </div>

        <div class="form-group">
          <label for="lname">Last Name</label>
          <input type="text" id="lname" name="lname" placeholder="Smith" required>
        </div>

      </div>

      <div class="form-group">
        <label for="mobile">Mobile Number</label>
        <input type="tel" id="mobile" name="mobile" placeholder="9876543210" required>
      </div>

      <div class="form-group">
        <label for="email">Work Email</label>
        <input type="email" id="email" name="email" placeholder="jane@agency.gov" required>
      </div>

      <div class="form-group">
        <label for="org">Organisation</label>
        <input type="text" id="org" name="org"
          placeholder="Your agency, company or institution" required>
      </div>

      <div class="form-row">

        <div class="form-group">
          <label for="segment">Organisation Type</label>

          <select id="segment" name="segment" required>

            <option value="">Select...</option>
            <option value="government">Government / Fire Agency</option>
            <option value="utility">Electric Utility</option>
            <option value="insurer">Insurer / Reinsurer</option>
            <option value="conservation">Conservation / NGO</option>
            <option value="climate">Climate Finance / ESG</option>
            <option value="landowner">Large Landowner / Agriculture</option>
            <option value="technology">Technology / Cloud Partner</option>
            <option value="research">Research / Academia</option>
            <option value="other">Other</option>

          </select>
        </div>

        <div class="form-group">

          <label for="product">Primary Interest</label>

          <select id="product" name="product" required>

            <option value="">Select...</option>
            <option value="insight">Wildfire Insight™ (Predict)</option>
            <option value="guardian">Wildfire Guardian™ (Prevent)</option>
            <option value="mvr">MVR™ (Verify)</option>
            <option value="response">Wildfire Response™ (Respond)</option>
            <option value="recovery">Wildfire Recovery™ (Recover)</option>
            <option value="full">Full Platform</option>
            <option value="research">Research Library</option>

          </select>
        </div>

      </div>

      <div class="form-group">
        <label for="geography">Geography / Region of Interest</label>

        <input type="text"
          id="geography"
          name="geography"
          placeholder="e.g. Los Angeles County, India..."
          required>
      </div>

      <div class="form-group">

        <label for="message">Tell Us About Your Challenge</label>

        <textarea
          id="message"
          name="message"
          rows="5"
          placeholder="Describe your current wildfire management challenge..."
          required></textarea>

      </div>

      <!-- Honeypot Spam Protection -->
      <input type="text" name="website" style="display:none;">

      <button type="submit" class="btn-primary" id="submitBtn">
        Send Request →
      </button>

      <div class="message-box" id="responseMessage"></div>

    </form>

  </div>

  <script>

    const form = document.getElementById("contactForm");
    const submitBtn = document.getElementById("submitBtn");
    const responseBox = document.getElementById("responseMessage");

    form.addEventListener("submit", async function(e){

      e.preventDefault();

      responseBox.style.display = "none";

      // Basic Validation

      const requiredFields = form.querySelectorAll("[required]");

      let valid = true;

      requiredFields.forEach(field => {

        if(field.value.trim() === ""){

          field.style.borderColor = "red";
          valid = false;

        }else{

          field.style.borderColor = "#30363d";
        }

      });

      if(!valid){

        showMessage("Please fill all required fields.", "error-box");
        return;
      }

      // Email Validation

      const email = document.getElementById("email").value;

      const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

      if(!email.match(emailPattern)){

        showMessage("Invalid email address.", "error-box");
        return;
      }

      submitBtn.innerHTML = "Sending...";
      submitBtn.disabled = true;

      const formData = new FormData(form);

      try{

        const response = await fetch("send-mail2.php",{
          method:"POST",
          body:formData
        });

        const result = await response.json();

        if(result.status){

          showMessage("Message sent successfully!", "success");

          form.reset();

        }else{

          showMessage(result.message, "error-box");
        }

      }catch(error){

        showMessage("Server error. Please try again.", "error-box");
      }

      submitBtn.innerHTML = "Send Request →";
      submitBtn.disabled = false;

    });

    function showMessage(message, type){

      responseBox.style.display = "block";
      responseBox.className = "message-box " + type;
      responseBox.innerHTML = message;

    }

  </script>

</body>
</html>
